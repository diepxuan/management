# Tmux config for ductn CLI workflow

# Enable mouse support:
# - scroll wheel scrolls tmux history
# - click selects pane
# - drag resizes panes/windows where supported
set -g mouse on

# Keep scrollback large enough for agent logs.
set -g history-limit 50000

# Make tmux use terminal capabilities correctly.
set -g default-terminal "screen-256color"
set -as terminal-overrides ',xterm-256color:RGB'

# Keep normal terminal-style selection/copy behavior friendlier.
# Hold Shift while selecting if the terminal emulator should own copy/paste.
set -g set-clipboard on

# Vi-style copy mode keys.
setw -g mode-keys vi

# Copy selected text in copy-mode with y or Enter.
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Extra keyboard pane navigation.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Reload config quickly: Prefix + r
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
